<div class="main-container">
  <h1>Consulta si te sale factible abonar hoy y vender hoy tu café</h1>

  <div class="cards-container">
    <div class="card clima" *ngIf="clima">
      <h3>Probabilidad de Lluvia</h3>
      <p class="valor">{{ clima.probabilidad }}%</p>
      <p style="text-transform: capitalize;">{{ clima.descripcion }}</p>
      <hr>
      <p><strong>{{ clima.mensaje }}</strong></p>
    </div>

    <div class="card cafe">
      <h3>Precio Café (Libra)</h3>
      <p class="valor">{{ precioCafe }}</p>
      <p>Bolsa de Nueva York → COP</p>
    </div>
  </div>
</div>
